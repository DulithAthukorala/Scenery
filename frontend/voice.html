<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice - Scenery AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    <style>
        .voice-orb-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 70px);
            padding: 3rem 1rem 2rem;
        }
        .voice-orb-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            max-width: 640px;
        }

        /* ── Status bar ── */
        .v-status {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        /* ── Orb ── */
        .orb-scene {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .orb-ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid transparent;
            pointer-events: none;
        }
        .orb-ring-1 { width: 172px; height: 172px; }
        .orb-ring-2 { width: 196px; height: 196px; }

        /* active ring animations injected by JS via .orb-scene data attr */
        .orb-scene[data-state="listening"] .orb-ring-1 {
            border-color: rgba(34,197,94,0.35);
            animation: orb-pulse 1.4s ease-out infinite;
        }
        .orb-scene[data-state="listening"] .orb-ring-2 {
            border-color: rgba(34,197,94,0.18);
            animation: orb-pulse 1.4s ease-out infinite 0.45s;
        }
        .orb-scene[data-state="speaking"] .orb-ring-1 {
            border-color: rgba(139,92,246,0.35);
            animation: orb-pulse 1.8s ease-out infinite;
        }
        .orb-scene[data-state="speaking"] .orb-ring-2 {
            border-color: rgba(139,92,246,0.18);
            animation: orb-pulse 1.8s ease-out infinite 0.6s;
        }
        @keyframes orb-pulse {
            0%   { transform: scale(1);    opacity: 1; }
            100% { transform: scale(1.35); opacity: 0; }
        }

        .orb-btn {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1.5px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: transform 0.18s ease, box-shadow 0.25s ease,
                        background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
            position: relative;
            z-index: 1;
        }
        .orb-btn:hover:not(:disabled) { transform: scale(1.05); }
        .orb-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .orb-btn[data-state="listening"] {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.45);
            color: #22c55e;
            box-shadow: 0 0 48px rgba(34,197,94,0.18);
        }
        .orb-btn[data-state="processing"] {
            background: rgba(249,115,22,0.12);
            border-color: rgba(249,115,22,0.45);
            color: #f97316;
            box-shadow: 0 0 48px rgba(249,115,22,0.18);
        }
        .orb-btn[data-state="speaking"] {
            background: rgba(139,92,246,0.12);
            border-color: rgba(139,92,246,0.45);
            color: #8b5cf6;
            box-shadow: 0 0 48px rgba(139,92,246,0.18);
        }
        .orb-btn[data-state="processing"] .orb-icon { animation: spin 1.4s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .orb-label {
            font-size: 0.88rem;
            color: var(--text-tertiary);
            min-height: 1.3em;
            text-align: center;
            transition: color 0.25s;
        }
        .orb-label[data-state="listening"]  { color: #22c55e; }
        .orb-label[data-state="processing"] { color: #f97316; }
        .orb-label[data-state="speaking"]   { color: #8b5cf6; }

        .end-btn {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            background: none;
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            padding: 0.38rem 1.2rem;
            cursor: pointer;
            transition: all 0.18s;
            display: none;
        }
        .end-btn:hover { color: #f87171; border-color: rgba(248,113,113,0.45); }

        /* ── Transcript ── */
        .v-transcript {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
        }
        .v-transcript-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 1.2rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .v-transcript-head h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            margin: 0;
        }
        .v-clear-btn {
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 0.78rem;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .v-clear-btn:hover { color: var(--text-primary); }
        .v-transcript-body {
            max-height: 360px;
            overflow-y: auto;
            padding: 1rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* messages */
        .vmsg {
            display: flex;
            gap: 0.65rem;
            align-items: flex-start;
        }
        .vmsg-avatar {
            width: 26px; height: 26px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 0.68rem; font-weight: 700;
        }
        .vmsg-user     .vmsg-avatar { background: rgba(139,92,246,0.18); color: #a78bfa; }
        .vmsg-assistant .vmsg-avatar { background: rgba(34,197,94,0.18);  color: #4ade80; }
        .vmsg-system   .vmsg-avatar { background: rgba(249,115,22,0.15);  color: #fb923c; }
        .vmsg-body { flex: 1; }
        .vmsg-role {
            font-size: 0.68rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-tertiary); margin-bottom: 3px;
        }
        .vmsg-text { font-size: 0.88rem; color: var(--text-primary); line-height: 1.55; }
        .vmsg-partial .vmsg-text { color: var(--text-tertiary); font-style: italic; }

        /* hotel cards */
        .v-hotels { display: flex; flex-direction: column; gap: 0.45rem; margin-top: 0.6rem; }
        .v-hotel-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.7rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }
        .v-hotel-name { font-weight: 600; font-size: 0.84rem; color: var(--text-primary); }
        .v-hotel-meta { font-size: 0.73rem; color: var(--text-tertiary); margin-top: 1px; }
        .v-hotel-price { font-size: 0.8rem; color: #4ade80; font-weight: 600; white-space: nowrap; }
    </style>
</head>
<body>
    <nav class="navbar glass-morphism">
        <div class="nav-content">
            <a href="index.html" class="nav-brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
                </svg>
                <span class="gradient-text">Scenery</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="chat.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Chat
                </a>
                <a href="voice.html" class="nav-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    Voice
                </a>
                <a href="search.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    Search
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="voice-orb-page fade-in">
            <div class="voice-orb-container">

                <!-- status -->
                <div class="v-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Connecting…</span>
                </div>

                <!-- orb -->
                <div class="orb-scene" id="orbScene">
                    <button type="button" id="orbBtn" class="orb-btn" disabled>
                        <svg id="orbIcon" class="orb-icon" width="52" height="52" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="1.6">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                    <div class="orb-ring orb-ring-1"></div>
                    <div class="orb-ring orb-ring-2"></div>
                </div>

                <p class="orb-label" id="orbLabel">Connecting…</p>
                <button type="button" id="endBtn" class="end-btn">End conversation</button>

                <!-- transcript -->
                <div class="v-transcript">
                    <div class="v-transcript-head">
                        <h3>Conversation</h3>
                        <button class="v-clear-btn" onclick="clearTranscript()">Clear</button>
                    </div>
                    <div class="v-transcript-body" id="transcript">
                        <div class="vmsg vmsg-assistant">
                            <div class="vmsg-avatar">AI</div>
                            <div class="vmsg-body">
                                <div class="vmsg-role">Assistant</div>
                                <div class="vmsg-text">Tap the mic and speak to find hotels. I'll listen and respond automatically.</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="voice.js"></script>
</body>
</html>
