<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice - Scenery AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    <style>
        /* ════════════════════════════════════════════════════════════════
           Voice Page — Premium Redesign
           ════════════════════════════════════════════════════════════════ */

        .voice-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 58px);
            padding: 2rem 1rem 2rem;
            gap: 1.5rem;
        }

        .voice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 580px;
            gap: 0;
        }

        /* ── Status pill ── */
        .v-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 999px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 0.01em;
            margin-bottom: 2.5rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-tertiary);
            flex-shrink: 0;
        }
        .status-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 6px rgba(34,197,94,0.5);
        }
        .status-dot.error {
            background: #ef4444;
            box-shadow: 0 0 6px rgba(239,68,68,0.5);
        }

        /* ── Orb ── */
        .orb-scene {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        /* Glow layer behind orb */
        .orb-glow {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .orb-scene[data-state="listening"] .orb-glow {
            background: rgba(139,115,85,0.25);
            opacity: 1;
        }
        .orb-scene[data-state="processing"] .orb-glow {
            background: rgba(139,115,85,0.2);
            opacity: 1;
        }
        .orb-scene[data-state="speaking"] .orb-glow {
            background: rgba(139,115,85,0.3);
            opacity: 1;
        }

        /* Pulse rings */
        .orb-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid transparent;
            pointer-events: none;
            transition: border-color 0.4s ease;
        }
        .orb-ring-1 { width: 170px; height: 170px; }
        .orb-ring-2 { width: 194px; height: 194px; }

        .orb-scene[data-state="listening"] .orb-ring-1 {
            border-color: rgba(139,115,85,0.3);
            animation: orb-pulse 2s ease-out infinite;
        }
        .orb-scene[data-state="listening"] .orb-ring-2 {
            border-color: rgba(139,115,85,0.15);
            animation: orb-pulse 2s ease-out infinite 0.5s;
        }
        .orb-scene[data-state="speaking"] .orb-ring-1 {
            border-color: rgba(139,115,85,0.35);
            animation: orb-pulse 1.6s ease-out infinite;
        }
        .orb-scene[data-state="speaking"] .orb-ring-2 {
            border-color: rgba(139,115,85,0.18);
            animation: orb-pulse 1.6s ease-out infinite 0.4s;
        }

        @keyframes orb-pulse {
            0%   { transform: scale(1);   opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* The orb button */
        .orb-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.35s ease,
                        background 0.35s ease,
                        border-color 0.35s ease,
                        color 0.35s ease;
            position: relative;
            z-index: 1;
        }
        .orb-btn:hover:not(:disabled) {
            transform: scale(1.06);
            box-shadow: var(--shadow-lg);
        }
        .orb-btn:active:not(:disabled) {
            transform: scale(0.97);
        }
        .orb-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .orb-btn[data-state="listening"] {
            background: linear-gradient(145deg, #8B7355, #6B5842);
            border-color: rgba(139,115,85,0.6);
            color: #fff;
            box-shadow: 0 4px 24px rgba(139,115,85,0.3), 0 0 60px rgba(139,115,85,0.15);
        }
        .orb-btn[data-state="processing"] {
            background: linear-gradient(145deg, #A08060, #7A6048);
            border-color: rgba(139,115,85,0.5);
            color: #fff;
            box-shadow: 0 4px 24px rgba(139,115,85,0.25);
        }
        .orb-btn[data-state="speaking"] {
            background: linear-gradient(145deg, #7A6048, #5E4A35);
            border-color: rgba(94,74,53,0.6);
            color: #fff;
            box-shadow: 0 4px 30px rgba(94,74,53,0.35), 0 0 70px rgba(139,115,85,0.12);
        }

        .orb-icon {
            transition: transform 0.3s ease;
        }
        .orb-btn[data-state="processing"] .orb-icon {
            animation: orb-spin 1.8s cubic-bezier(0.37,0,0.63,1) infinite;
        }
        @keyframes orb-spin { to { transform: rotate(360deg); } }

        /* Label under orb */
        .orb-label {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-tertiary);
            min-height: 1.3em;
            text-align: center;
            transition: color 0.35s ease;
            letter-spacing: 0.01em;
            margin-bottom: 0.5rem;
        }
        .orb-label[data-state="listening"]  { color: #8B7355; }
        .orb-label[data-state="processing"] { color: #A08060; }
        .orb-label[data-state="speaking"]   { color: #5E4A35; }

        /* End button */
        .end-btn {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: none;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
        }
        .end-btn:hover {
            color: #dc2626;
            border-color: rgba(220,38,38,0.3);
            background: rgba(220,38,38,0.04);
        }

        /* ── Transcript ── */
        .v-transcript {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .v-transcript-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        .v-transcript-head h3 {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
            margin: 0;
        }
        .v-clear-btn {
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 0.73rem;
            font-weight: 500;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 6px;
            transition: all 0.15s ease;
        }
        .v-clear-btn:hover {
            color: var(--text-primary);
            background: rgba(0,0,0,0.04);
        }

        .v-transcript-body {
            max-height: 400px;
            overflow-y: auto;
            padding: 1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        /* Messages */
        .vmsg {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            animation: msg-in 0.3s ease-out;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .vmsg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .vmsg-user .vmsg-avatar {
            background: rgba(139,115,85,0.12);
            color: #8B7355;
        }
        .vmsg-assistant .vmsg-avatar {
            background: rgba(94,74,53,0.1);
            color: #5E4A35;
        }
        .vmsg-system .vmsg-avatar {
            background: rgba(239,68,68,0.08);
            color: #ef4444;
        }

        .vmsg-body { flex: 1; min-width: 0; }
        .vmsg-role {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            margin-bottom: 2px;
        }
        .vmsg-text {
            font-size: 0.86rem;
            color: var(--text-primary);
            line-height: 1.6;
        }
        .vmsg-partial .vmsg-text {
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Hotel cards */
        .v-hotels {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 0.5rem;
        }
        .v-hotel-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.65rem 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.15s ease;
        }
        .v-hotel-card:hover {
            background: var(--bg-hover);
            border-color: rgba(139,115,85,0.15);
        }
        .v-hotel-name {
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text-primary);
            line-height: 1.3;
        }
        .v-hotel-meta {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-top: 2px;
        }
        .v-hotel-price {
            font-size: 0.8rem;
            color: #8B7355;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: -0.01em;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .voice-page { padding: 1.5rem 0.75rem; }
            .orb-scene { width: 170px; height: 170px; }
            .orb-btn { width: 120px; height: 120px; }
            .orb-ring-1 { width: 148px; height: 148px; }
            .orb-ring-2 { width: 168px; height: 168px; }
            .orb-glow { width: 130px; height: 130px; }
            .v-transcript-body { max-height: 320px; }
        }
    </style>
</head>
<body>
    <nav class="navbar glass-morphism">
        <div class="nav-content">
            <a href="index.html" class="nav-brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
                </svg>
                <span class="gradient-text">Scenery</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="chat.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Chat
                </a>
                <a href="voice.html" class="nav-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    Voice
                </a>
                <a href="search.html" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    Search
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="voice-page fade-in">
            <div class="voice-container">

                <!-- Status pill -->
                <div class="v-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Connecting</span>
                </div>

                <!-- Orb -->
                <div class="orb-scene" id="orbScene">
                    <div class="orb-glow"></div>
                    <button type="button" id="orbBtn" class="orb-btn" disabled>
                        <svg id="orbIcon" class="orb-icon" width="48" height="48" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                    <div class="orb-ring orb-ring-1"></div>
                    <div class="orb-ring orb-ring-2"></div>
                </div>

                <p class="orb-label" id="orbLabel">Connecting</p>
                <button type="button" id="endBtn" class="end-btn">End conversation</button>

                <!-- Transcript -->
                <div class="v-transcript">
                    <div class="v-transcript-head">
                        <h3>Conversation</h3>
                        <button class="v-clear-btn" onclick="clearTranscript()">Clear</button>
                    </div>
                    <div class="v-transcript-body" id="transcript">
                        <div class="vmsg vmsg-assistant">
                            <div class="vmsg-avatar">AI</div>
                            <div class="vmsg-body">
                                <div class="vmsg-role">Scenery</div>
                                <div class="vmsg-text">Tap the microphone and ask me about hotels in Sri Lanka.</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="voice.js"></script>
</body>
</html>
